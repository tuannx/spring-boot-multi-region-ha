map $http_x_source_region $source_region_host {
    default app-us;
    us-east-1 app-us;
    eu-west-1 app-eu;
}

map $http_x_source_region $source_region_port {
    default 8080;
    us-east-1 8080;
    eu-west-1 8081;
}

map $http_x_source_region $source_region_name {
    default us-east-1;
    us-east-1 us-east-1;
    eu-west-1 eu-west-1;
}

server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 ipv6=off valid=5s;

    # Health check endpoint (proxies to us-east-1 primary by default)
    location /health {
        set $app_us_host app-us;
        set $app_us_port 8080;
        proxy_pass http://$app_us_host:$app_us_port/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;

        # If primary fails, fallback to eu
        error_page 502 503 504 = @health_eu;
    }

    location @health_eu {
        set $app_eu_host app-eu;
        set $app_eu_port 8081;
        proxy_pass http://$app_eu_host:$app_eu_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Admin endpoints (direct to us for topology/failover control)
    location /admin/ {
        set $app_us_host app-us;
        set $app_us_port 8080;
        proxy_pass http://$app_us_host:$app_us_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Product API - route compute to the source region, defaulting to us-east-1.
    # Send X-Source-Region: eu-west-1 to exercise EU-local request compute.
    location /api/ {
        proxy_pass http://$source_region_host:$source_region_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Source-Region $http_x_source_region;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Routed-Region $source_region_name always;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Actuator health check for Docker/Orchestrator
    location = /actuator/health {
        set $app_us_host app-us;
        set $app_us_port 8080;
        proxy_pass http://$app_us_host:$app_us_port/actuator/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Default route
    location / {
        set $app_us_host app-us;
        set $app_us_port 8080;
        proxy_pass http://$app_us_host:$app_us_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
