services:
  # ============================================
  # REGION 1: us-east-1 (Primary Writer)
  # ============================================
  postgres-us:
    image: postgres:16
    container_name: multiregion-us
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      TZ: UTC
    ports:
      - "5442:5432"
    volumes:
      - ./docker/init/us/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pg-us-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      multiregion-net:
        aliases:
          - postgres-us.local

  app-us:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        SPRING_PROFILES_ACTIVE: region-us
    image: multiregion-app-us:latest
    container_name: multiregion-app-us
    environment:
      SPRING_PROFILES_ACTIVE: region-us
      DB_HOST: postgres-us
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASS: apppass
      AWS_REGION: us-east-1
      REGION_ROLE: primary
      ACTIVE_WRITER_DB_HOST: postgres-us
      ACTIVE_WRITER_DB_PORT: 5432
      LOCAL_DB_HOST: postgres-us
      LOCAL_DB_PORT: 5432
      FAILOVER_WRITER_DB_HOST: postgres-eu
      FAILOVER_WRITER_DB_PORT: 5432
      FAILOVER_FAILURE_THRESHOLD: 3
      FAILOVER_ALLOW_UNFENCED_PROMOTION: "false"
      APP_PORT: 8080
      QUEUE_LISTENER_TYPE: rabbit
      RABBITMQ_US_HOST: rabbitmq-us
      RABBITMQ_US_PORT: 5672
      RABBITMQ_EU_HOST: rabbitmq-eu
      RABBITMQ_EU_PORT: 5672
      RABBITMQ_USER: appuser
      RABBITMQ_PASS: apppass
    ports:
      - "8080:8080"
    depends_on:
      postgres-us:
        condition: service_healthy
      rabbitmq-us:
        condition: service_healthy
      rabbitmq-eu:
        condition: service_healthy
    networks:
      - multiregion-net

  # ============================================
  # REGION 2: eu-west-1 (Secondary / DR)
  # ============================================
  postgres-eu:
    image: postgres:16
    container_name: multiregion-eu
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      TZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - ./docker/init/eu/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pg-eu-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      multiregion-net:
        aliases:
          - postgres-eu.local

  app-eu:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        SPRING_PROFILES_ACTIVE: region-eu
    image: multiregion-app-eu:latest
    container_name: multiregion-app-eu
    environment:
      SPRING_PROFILES_ACTIVE: region-eu
      DB_HOST: postgres-eu
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASS: apppass
      AWS_REGION: eu-west-1
      REGION_ROLE: secondary
      ACTIVE_WRITER_DB_HOST: postgres-us
      ACTIVE_WRITER_DB_PORT: 5432
      LOCAL_DB_HOST: postgres-eu
      LOCAL_DB_PORT: 5432
      FAILOVER_WRITER_DB_HOST: postgres-eu
      FAILOVER_WRITER_DB_PORT: 5432
      FAILOVER_FAILURE_THRESHOLD: 3
      FAILOVER_ALLOW_UNFENCED_PROMOTION: "false"
      APP_PORT: 8081
      QUEUE_LISTENER_TYPE: rabbit
      RABBITMQ_US_HOST: rabbitmq-us
      RABBITMQ_US_PORT: 5672
      RABBITMQ_EU_HOST: rabbitmq-eu
      RABBITMQ_EU_PORT: 5672
      RABBITMQ_USER: appuser
      RABBITMQ_PASS: apppass
    ports:
      - "8081:8081"
    depends_on:
      postgres-eu:
        condition: service_healthy
      rabbitmq-us:
        condition: service_healthy
      rabbitmq-eu:
        condition: service_healthy
    networks:
      - multiregion-net

  # ============================================
  # REGION 1 QUEUE: RabbitMQ for us-east-1
  # ============================================
  rabbitmq-us:
    image: rabbitmq:3.13-management
    container_name: multiregion-rabbitmq-us
    environment:
      RABBITMQ_DEFAULT_USER: appuser
      RABBITMQ_DEFAULT_PASS: apppass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-us-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - multiregion-net

  # ============================================
  # REGION 2 QUEUE: RabbitMQ for eu-west-1
  # ============================================
  rabbitmq-eu:
    image: rabbitmq:3.13-management
    container_name: multiregion-rabbitmq-eu
    environment:
      RABBITMQ_DEFAULT_USER: appuser
      RABBITMQ_DEFAULT_PASS: apppass
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq-eu-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - multiregion-net

  # ============================================
  # Nginx Router (Failover Simulation)
  # ============================================
  nginx-router:
    image: nginx:alpine
    container_name: multiregion-router
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-us
      - app-eu
    networks:
      - multiregion-net

volumes:
  pg-us-data:
  pg-eu-data:
  rabbitmq-us-data:
  rabbitmq-eu-data:

networks:
  multiregion-net:
    driver: bridge
