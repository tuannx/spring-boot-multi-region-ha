name: Application E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.12"

      - name: Run unit, integration, and architecture tests
        run: gradle -p app clean test --no-daemon

      - name: Run Docker end-to-end acceptance
        run: ./scripts/e2e-acceptance.sh --start --cleanup

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-evidence
          path: reports/queue-takeover/
          if-no-files-found: ignore
